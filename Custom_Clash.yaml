  - RULE-SET,YouTube,Media
  - RULE-SET,Global-Media,Media

  # 5. 服务
  - RULE-SET,Mail,Tunnel
  - DST-PORT,22,Tunnel
  - RULE-SET,AppleProxy,Apple
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Telegram,Telegram
  - RULE-SET,Google,Google

  # 6. 金融
  - RULE-SET,Crypto,Crypto
  - RULE-SET,PayPal,PayPal
  - RULE-SET,Stripe,Stripe

  # 7. 工具
  - RULE-SET,Speedtest,Speedtest
  - RULE-SET,Check,Check

  # 8. CDN & 下载
  - RULE-SET,CDN-Domainset,CDN
  - RULE-SET,CDN-NonIP,CDN
  - RULE-SET,Download-Domainset,CDN
  - RULE-SET,Download-NonIP,CDN

  # 9. 国内域名
  - RULE-SET,China_Classical,DIRECT

  # 10. IP 规则
  - RULE-SET,IP-Reject,REJECT

  # 11. 兜底
  - RULE-SET,Proxy_Classical,Proxy
  - RULE-SET,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Final
