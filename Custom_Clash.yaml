# ====== 分流规则 ======
rules:
  # 1. 广告拦截（最高优先级）
  - RULE-SET,AWAvenue-Ads,REJECT

  # 2. 直连覆盖（防止被后续代理规则误匹配）
  - RULE-SET,Apple-CN,DIRECT
  - RULE-SET,China-Media,DIRECT
  - RULE-SET,SteamCN,DIRECT

  # 3. AI 服务
  - RULE-SET,Claude,AI
  - RULE-SET,OpenAI,AI
  - RULE-SET,Copilot,AI

  # 4. 流媒体
  - RULE-SET,Netflix,Media
  - RULE-SET,YouTube,Media
  - RULE-SET,TikTok,TikTok
  - RULE-SET,Global-Media,Media

  # 5. 服务 & 工具
  - RULE-SET,AppleProxy,Apple
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Telegram,Telegram
  - RULE-SET,Mail,Tunnel
  - DST-PORT,22,Tunnel

  # 6. 金融
  - RULE-SET,Crypto,Crypto
  - RULE-SET,PayPal,PayPal
  - RULE-SET,Stripe,Stripe

  # 7. 工具
  - RULE-SET,Speedtest,Speedtest

  # 8. 国内域名
  - RULE-SET,China_Classical,DIRECT

  # 9. 兜底
  - RULE-SET,Proxy_Classical,Proxy
  - RULE-SET,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
