# ==============================================
# Clash (mihomo) 配置模板
# 转换自 Custom_QX.conf
# ==============================================

# ====== 基础设置 ======
port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

# ====== GeoIP ======
geox-url:
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-only-cn-private.mmdb"

# ====== DNS ======
dns:
    enable: true
    listen: 0.0.0.0:1053
    ipv6: false
    prefer-h3: true
    respect-rules: true
    enhanced-mode: fake-ip
    use-hosts: true
    # 用于解析nameserver中的域名dns服务器，理论上如果nameserver中的dns服务器都是ip类的，这里也可以不填
    # 前两个是我这边电信的运营商dns，可以换成你自己的，也可以全部使用大厂的公共dns
    # 由于只用来解析nameserver，不使用doh或dot
    default-nameserver:
        - 119.29.29.29
        - 223.5.5.5
    # 在这个配置中，只用来解析没匹配到nameserver-policy的规则，几乎都是访问外网，因此使用google和cf的doh
    nameserver:
        - https://dns.google/dns-query
        - https://1.1.1.1/dns-query
    # 用于解析代理节点的域名
    proxy-server-nameserver:
        - https://223.5.5.5/dns-query
        - https://1.12.12.12/dns-query
    # 国内访问的规则使用国内的dns，不考虑dns泄露，不使用doh或dot
    nameserver-policy:
        "geosite:cn,apple-cn,category-games@cn,private":
            - 119.29.29.29
            - 223.5.5.5
    fake-ip-range: 28.0.0.1/8
    fake-ip-filter:
        - '*'
        - '+.lan'
        - '+.local'
        - +.stun.*.*
        - +.stun.*.*.*
        - +.stun.*.*.*.*
        - +.stun.*.*.*.*.*

proxies: # {{proxies}}

# ====== 策略组 ======
proxy-groups:
  # ------ 基础策略 ------
  - name: Proxy
    type: select
    proxies:
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US
      - DIRECT

  - name: AI
    type: select
    proxies:
      - Proxy
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  # ------ 流媒体 ------
  - name: Media
    type: select
    proxies:
      - Proxy
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US
      - DIRECT

  - name: TikTok
    type: select
    proxies:
      - Proxy
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  # ------ 服务 ------
  - name: Apple
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  - name: GitHub
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  - name: Telegram
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  - name: Tunnel
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  # ------ 金融 ------
  - name: Crypto
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  - name: PayPal
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  - name: Stripe
    type: select
    proxies:
      - Proxy
      - DIRECT
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇼🇸 TW
      - 🇯🇵 JP
      - 🇺🇲 US

  # ------ 工具 ------
  - name: Speedtest
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 HK
      - 🇼🇸 TW
      - 🇸🇬 SG
      - 🇯🇵 JP
      - 🇺🇲 US

  # ------ 地区节点组 ------
  - name: 🇭🇰 HK
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?!.*(Game))(港|Hong|HK)"
    proxies: []

  - name: 🇸🇬 SG
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?!.*(Game))(新|Singapore|SG)"
    proxies: []

  - name: 🇼🇸 TW
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?!.*(Game))(台|Tai|TW)"
    proxies: []

  - name: 🇺🇲 US
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?!.*(Game))(美|States|US)"
    proxies: []

  - name: 🇯🇵 JP
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?!.*(Game))(日|Japan|JP)"
    proxies: []

