    # ç”±ن؛ژهڈھç”¨و‌¥è§£و‍گnameserverï¼Œن¸چن½؟ç”¨dohوˆ–dot
    default-nameserver:
        - 119.29.29.29
        - 223.5.5.5
    # هœ¨è؟™ن¸ھé…چç½®ن¸­ï¼Œهڈھç”¨و‌¥è§£و‍گو²،هŒ¹é…چهˆ°nameserver-policyçڑ„è§„هˆ™ï¼Œه‡ ن¹ژéƒ½وک¯è®؟é—®ه¤–ç½‘ï¼Œه› و­¤ن½؟ç”¨googleه’Œcfçڑ„doh
    nameserver:
        - https://dns.google/dns-query
        - https://1.1.1.1/dns-query
    # ç”¨ن؛ژè§£و‍گن»£çگ†èٹ‚ç‚¹çڑ„هںںهگچ
    proxy-server-nameserver:
        - https://223.5.5.5/dns-query
        - https://1.12.12.12/dns-query
    # ه›½ه†…è®؟é—®çڑ„è§„هˆ™ن½؟ç”¨ه›½ه†…çڑ„dnsï¼Œن¸چè€ƒè™‘dnsو³„éœ²ï¼Œن¸چن½؟ç”¨dohوˆ–dot
    nameserver-policy:
